<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" rx="30" ry="30" fill="#163755"/>

  <!-- Pump body (circle) -->
  <circle cx="200" cy="140" r="70" fill="none" stroke="white" stroke-width="8"/>

  <!-- Impeller (4-blade fan) -->
  <g transform="translate(200,140)">
    <!-- Center -->
    <circle cx="0" cy="0" r="8" fill="white"/>
    <!-- Blades -->
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="white" transform="rotate(0)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="white" transform="rotate(90)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="white" transform="rotate(180)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="white" transform="rotate(270)"/>
  </g>

  <!-- Pipe top (outlet) -->
  <rect x="196" y="40" width="8" height="32" fill="white"/>
  <rect x="196" y="40" width="40" height="8" fill="white"/>
  <rect x="228" y="40" width="8" height="20" fill="white"/>

  <!-- Pipe left (inlet) -->
  <rect x="100" y="136" width="32" height="8" fill="white"/>
  <rect x="100" y="124" width="8" height="20" fill="white"/>

  <!-- Text -->
  <text x="200" y="280" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">NMT C</text>
  <text x="200" y="330" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="white" text-anchor="middle" letter-spacing="3">MODBUS TCP</text>
</svg>
